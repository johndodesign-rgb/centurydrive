<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Century Drive</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────
//  CENTURY DRIVE — OutRun pseudo-3D road using Phaser
//  Road technique: segment-based perspective projection
//  Each segment has curve + hill data. We project front→back,
//  accumulate curve as screen-X offset, draw trapezoids back→front.
// ─────────────────────────────────────────────────────────────────

function buildTrack() {
  const segs = [];
  function add(n, curve, hill) {
    for (let i = 0; i < n; i++) segs.push({ curve: curve||0, hill: hill||0 });
  }
  add(60,  0,       0);
  add(40, -0.004,   0);
  add(20,  0,       0);
  add(50,  0.006,   0);
  add(20,  0,       0.003);
  add(40, -0.007,   0);
  add(20,  0,       0);
  add(50,  0.005,  -0.002);
  add(30,  0,       0);
  add(40, -0.004,   0.002);
  add(60,  0,       0);
  return segs;
}

const TRACK     = buildTrack();
const TRACK_LEN = TRACK.length;
const W = window.innerWidth;
const H = window.innerHeight;

class RoadScene extends Phaser.Scene {
  constructor() { super('Road'); }

  preload() {
    this.load.image('car', './MuscleCar.png');
  }

  create() {
    this.gfx     = this.add.graphics();
    this.pos     = 0;
    this.spd     = 0;
    this.playerX = 0;
    this.smokeParticles = [];

    // Car — large, sits at bottom center
    this.car = this.add.image(W / 2, H - 70, 'car');
    this.car.setDisplaySize(200, 200);
    this.car.setDepth(10);
    this.car.setOrigin(0.5, 1); // anchor to bottom center

    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd    = this.input.keyboard.addKeys('W,A,S,D');
    this.touchDX = 0;
    this.input.on('pointermove', p => { if (p.isDown) this.touchDX = p.velocity.x; });
    this.input.on('pointerup',   () => { this.touchDX = 0; });
  }

  update(time, delta) {
    const dt = Math.min(delta / 16.67, 2);

    // Speed
    this.spd = Math.min(0.26, this.spd + 0.003 * dt);
    this.pos += this.spd * dt;
    if (this.pos >= TRACK_LEN) this.pos -= TRACK_LEN;

    // Curve pull on player
    const seg = TRACK[Math.floor(this.pos) % TRACK_LEN];
    this.playerX -= seg.curve * this.spd * 8 * dt;

    // Steering
    const left  = this.cursors.left.isDown  || this.wasd.A.isDown || this.touchDX < -20;
    const right = this.cursors.right.isDown || this.wasd.D.isDown || this.touchDX >  20;
    if (left)  this.playerX -= 0.018 * dt;
    if (right) this.playerX += 0.018 * dt;
    this.playerX = Phaser.Math.Clamp(this.playerX, -1.2, 1.2);

    // Shift car sprite for steering feel
    const targetX = W / 2 - this.playerX * 55;
    this.car.x += (targetX - this.car.x) * 0.1 * dt;

    this.gfx.clear();
    this.drawScene();
  }

  drawScene() {
    const g       = this.gfx;
    const HORIZON = Math.floor(H * 0.42);
    const ROAD_H  = H - HORIZON;

    // ── SKY ──────────────────────────────────────────────────────
    g.fillStyle(0x1a0a04); g.fillRect(0, 0, W, HORIZON);
    g.fillStyle(0x2e1006); g.fillRect(0, HORIZON - 10, W, 14);

    // Sun
    [[0xc84010,52],[0xe87820,36],[0xffc840,18]].forEach(([c,r]) => {
      g.fillStyle(c);
      g.slice(W/2, HORIZON, r, Math.PI, 2*Math.PI);
      g.fillPath();
    });

    // Buildings
    g.fillStyle(0x0c0702);
    [[0.06,0.08,0.10],[0.16,0.05,0.07],[0.22,0.06,0.05],
     [0.68,0.06,0.06],[0.76,0.08,0.09],[0.86,0.05,0.07]]
      .forEach(([bx,bw,bh]) => g.fillRect(W*bx, HORIZON-H*bh, W*bw, H*bh));

    // Ground
    g.fillStyle(0x0c0a04); g.fillRect(0, HORIZON, W, H - HORIZON);

    // ── ROAD ─────────────────────────────────────────────────────
    //
    //  Project N segments. n=0 is directly in front of camera (bottom),
    //  n=DRAW_N is at the horizon (top).
    //
    //  scale(n) = 1 / (n+1)  — simple perspective
    //  screenY  = HORIZON + ROAD_H * scale  — maps 0..1 to horizon..bottom
    //  halfW    = BASE_W * scale            — road width narrows to horizon
    //  curveX   accumulates leftward/rightward shift

    const DRAW_N = 200;
    const BASE_W = W * 0.9;  // road width at camera (screen bottom)

    const proj = [];
    let curveX  = 0;
    let cDX     = 0;

    for (let n = 0; n < DRAW_N; n++) {
      const si   = (Math.floor(this.pos) + n) % TRACK_LEN;
      const tseg = TRACK[si];

      // frac: 0 at camera (bottom), 1 at horizon (top)
      const frac  = n / DRAW_N;
      // scale: 1 at camera, 0 at horizon
      const scale = 1 - frac;

      const screenY = HORIZON + ROAD_H * scale;
      const halfW   = BASE_W  * scale * 0.5;
      const screenX = W / 2 - this.playerX * halfW * 0.6 + curveX;

      proj.push({ screenX, screenY, halfW, si });

      // Curve accumulates. Closer segments (small n, large scale)
      // contribute more visual shift — multiply by (1-frac) to weight near segs.
      cDX    += tseg.curve * 0.6;
      curveX -= cDX * (1 - frac) * 12;
    }

    // Draw back→front: proj[DRAW_N-1] is horizon, proj[0] is nearest
    for (let n = proj.length - 1; n > 0; n--) {
      const far  = proj[n];     // farther strip (smaller on screen)
      const near = proj[n - 1]; // nearer strip  (larger on screen)

      if (far.screenY  < HORIZON - 2) continue;
      if (near.screenY > H + 2)       continue;

      const alt    = Math.floor(far.si / 5) % 2;
      const rumble = Math.floor(far.si / 3) % 2;

      // Grass
      g.fillStyle(alt ? 0x0f0c04 : 0x131006);
      g.fillRect(0, far.screenY, W, near.screenY - far.screenY);

      // Road trapezoid
      g.fillStyle(alt ? 0x2a2826 : 0x232120);
      g.fillPoints([
        { x: far.screenX  - far.halfW,  y: far.screenY  },
        { x: far.screenX  + far.halfW,  y: far.screenY  },
        { x: near.screenX + near.halfW, y: near.screenY },
        { x: near.screenX - near.halfW, y: near.screenY },
      ], true);

      // Rumble strips
      const rCol = rumble ? 0xc8281e : 0xf0ede8;
      const rw   = Math.max(2, far.halfW * 0.09);
      g.fillStyle(rCol);
      g.fillPoints([
        { x: far.screenX  - far.halfW  - rw, y: far.screenY  },
        { x: far.screenX  - far.halfW,       y: far.screenY  },
        { x: near.screenX - near.halfW,      y: near.screenY },
        { x: near.screenX - near.halfW - rw, y: near.screenY },
      ], true);
      g.fillPoints([
        { x: far.screenX  + far.halfW,       y: far.screenY  },
        { x: far.screenX  + far.halfW  + rw, y: far.screenY  },
        { x: near.screenX + near.halfW + rw, y: near.screenY },
        { x: near.screenX + near.halfW,      y: near.screenY },
      ], true);

      // Lane markings
      if (alt && far.halfW > 4) {
        const lw = Math.max(1, far.halfW * 0.014);
        const drawLine = (fx, nx) => {
          g.fillPoints([
            { x: fx - lw, y: far.screenY  }, { x: fx + lw, y: far.screenY  },
            { x: nx + lw, y: near.screenY }, { x: nx - lw, y: near.screenY },
          ], true);
        };
        g.fillStyle(0xd4c060, 0.55);
        drawLine(far.screenX, near.screenX);
        g.fillStyle(0xd4c060, 0.28);
        drawLine(far.screenX - far.halfW*0.35, near.screenX - near.halfW*0.35);
        drawLine(far.screenX + far.halfW*0.35, near.screenX + near.halfW*0.35);
      }
    }

    // ── SMOKE ────────────────────────────────────────────────────
    const carBot   = this.car.y;
    const pipeL    = this.car.x - this.car.displayWidth  * 0.26;
    const pipeR    = this.car.x + this.car.displayWidth  * 0.26;

    if (Math.random() < 0.5) {
      [pipeL, pipeR].forEach(px => {
        this.smokeParticles.push({
          x: px + (Math.random()-0.5)*8, y: carBot + 6,
          vx: (Math.random()-0.5)*0.5,   vy: 1+Math.random()*0.8,
          r: 5+Math.random()*3,           a: 0.45
        });
      });
    }
    this.smokeParticles = this.smokeParticles.filter(s => s.a > 0.02);
    this.smokeParticles.forEach(s => {
      s.x += s.vx; s.y += s.vy; s.r += 0.28; s.a -= 0.016;
      g.fillStyle(0xbbbbbb, s.a * 0.55);
      g.fillCircle(s.x, s.y, s.r);
    });
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  backgroundColor: '#000000',
  scene: RoadScene,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  render: { antialias: true },
});
</script>
</body>
</html>
