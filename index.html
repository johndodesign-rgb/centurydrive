<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Century Drive</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
canvas {
  display:block;
  width:100%;
  height:100%;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─────────────────────────────────────────────────────
//  CENTURY DRIVE — stripped to: road + curves + car
//
//  OutRun road technique:
//  - Road is N horizontal line-segments (strips) drawn back→front
//  - Each strip has a world Z, a curve accumulation, and a hill Y
//  - We walk from camera forward, projecting each strip to screen
//  - Curve is accumulated as a screen-X offset that grows toward camera
// ─────────────────────────────────────────────────────

const cv = document.getElementById('c');
const cx = cv.getContext('2d');

// ── Resize ──────────────────────────────────────────
function resize() {
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Track definition ────────────────────────────────
// Each segment: { curve, hill }
// curve: negative = bend left, positive = bend right
// hill:  negative = dip, positive = rise
// Values around 0.003–0.008 give gentle-to-strong curves

function makeSeg(curve, hill, n) {
  const out = [];
  for (let i = 0; i < n; i++) out.push({ curve, hill });
  return out;
}

const TRACK = [
  ...makeSeg( 0,      0,     40),   // straight
  ...makeSeg(-0.006,  0,     30),   // left curve
  ...makeSeg( 0,      0,     20),   // straight
  ...makeSeg( 0.007,  0,     35),   // right curve
  ...makeSeg( 0,      0,     20),   // straight
  ...makeSeg(-0.005,  0.003, 30),   // left + hill
  ...makeSeg( 0.008,  0,     25),   // hard right
  ...makeSeg( 0,      0,     30),   // straight
  ...makeSeg( 0.005, -0.002, 25),   // right + dip
  ...makeSeg( 0,      0,     40),   // straight
];
const TRACK_LEN = TRACK.length;

// ── Camera / player ─────────────────────────────────
let pos    = 0;      // camera position along track (float segment index)
let spd    = 0;      // current speed (segments/frame)
const MAX_SPD  = 0.22;
const ACCEL    = 0.004;

let playerX  = 0;   // lateral position, -1 = far left, +1 = far right
let leftDown = false;
let rightDown= false;

// Input
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') leftDown  = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightDown = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') leftDown  = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') rightDown = false;
});
let tx0 = 0;
window.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive:true });
window.addEventListener('touchmove',  e => {
  const dx = e.touches[0].clientX - tx0;
  leftDown  = dx < -20;
  rightDown = dx >  20;
}, { passive:true });
window.addEventListener('touchend', () => { leftDown = false; rightDown = false; }, { passive:true });

// ── Car sprite ──────────────────────────────────────
const carImg = new Image();
carImg.src = './MuscleCar.png';

// Exhaust smoke
let smoke = [];
function addSmoke(x, y) {
  for (let i = 0; i < 2; i++) {
    smoke.push({
      x: x + (Math.random() - 0.5) * 12,
      y: y,
      vx: (Math.random() - 0.5) * 0.4,
      vy: 0.8 + Math.random() * 0.6,
      r: 4 + Math.random() * 3,
      a: 0.5
    });
  }
}
function tickSmoke() {
  smoke = smoke.filter(s => s.a > 0.02);
  smoke.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.r += 0.25;
    s.a -= 0.018;
  });
}
function drawSmoke() {
  smoke.forEach(s => {
    cx.globalAlpha = s.a * 0.6;
    cx.fillStyle = '#bbb';
    cx.beginPath();
    cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    cx.fill();
  });
  cx.globalAlpha = 1;
}

// ── Main render loop ────────────────────────────────
function frame() {
  requestAnimationFrame(frame);

  const W = cv.width;
  const H = cv.height;

  // Physics
  spd = Math.min(MAX_SPD, spd + ACCEL);
  pos += spd;
  if (pos >= TRACK_LEN) pos -= TRACK_LEN;

  // Road pull — curve drags playerX
  const curSeg = TRACK[Math.floor(pos) % TRACK_LEN];
  playerX -= curSeg.curve * spd * 12;

  // Steer
  if (leftDown)  playerX -= 0.018;
  if (rightDown) playerX += 0.018;
  playerX = Math.max(-1, Math.min(1, playerX));

  // ── Sky ──────────────────────────────────────────
  cx.fillStyle = '#1a0a04';
  cx.fillRect(0, 0, W, H);

  // horizon glow
  const HORIZON = Math.floor(H * 0.44);
  cx.fillStyle = '#2e1006';
  cx.fillRect(0, HORIZON - 8, W, 12);

  // sun
  cx.fillStyle = '#c84010';
  cx.beginPath(); cx.arc(W / 2, HORIZON, 52, Math.PI, 2 * Math.PI); cx.fill();
  cx.fillStyle = '#e87820';
  cx.beginPath(); cx.arc(W / 2, HORIZON, 36, Math.PI, 2 * Math.PI); cx.fill();
  cx.fillStyle = '#ffc840';
  cx.beginPath(); cx.arc(W / 2, HORIZON, 18, Math.PI, 2 * Math.PI); cx.fill();

  // silhouette buildings
  cx.fillStyle = '#0c0702';
  [[0.06,0.08,0.10],[0.16,0.05,0.07],[0.22,0.06,0.05],
   [0.68,0.06,0.06],[0.76,0.08,0.09],[0.86,0.05,0.07],[0.93,0.05,0.05]]
    .forEach(([bx,bw,bh]) => cx.fillRect(W*bx, HORIZON-H*bh, W*bw, H*bh));

  // ground
  cx.fillStyle = '#0c0a04';
  cx.fillRect(0, HORIZON, W, H - HORIZON);

  // ── ROAD ─────────────────────────────────────────
  //
  //  Classic OutRun projection:
  //  We draw N strips from the farthest visible segment down to the nearest.
  //  For each strip we project its world Z to a screen Y.
  //  We accumulate screen-X curve offset as we come toward camera.
  //
  //  Key formula:
  //    scale = camD / segZ          (perspective scale)
  //    screenY = camY - scale * camH (projected Y)
  //    roadW   = scale * ROAD_WIDTH  (projected road half-width)
  //
  //  Curve offset: as we walk from horizon→camera, each segment's
  //  curve value shifts the projected X. Near segments shift more
  //  than far ones because they have a higher perspective scale.

  const DRAW_SEGS  = 220;   // how many segments to draw
  const CAM_D      = 0.84;  // camera depth (controls FOV)
  const CAM_HEIGHT = 1500;  // camera height above road (tune for road angle)
  const ROAD_W     = 3000;  // road half-width in world units

  // Project each visible segment to screen, front to back first
  // so we can draw back to front
  const segs = [];
  let x   = 0;  // accumulated screen-X curve offset
  let dx  = 0;  // curve per segment (updated each seg)

  for (let n = 0; n < DRAW_SEGS; n++) {
    const segIdx = (Math.floor(pos) + n) % TRACK_LEN;
    const seg = TRACK[segIdx];

    // World Z of this segment relative to camera
    // segment 0 = just in front of camera, segment N = far away
    const z = (n + 1 - (pos % 1)); // fractional offset for smooth scroll

    const scale    = CAM_D / z;
    const screenX  = (W / 2) + scale * (playerX * -ROAD_W) + x;
    const screenY  = (HORIZON) + scale * CAM_HEIGHT * -1 + H * 0.5;
    const roadHalfW = scale * ROAD_W;

    segs.push({ screenX, screenY, roadHalfW, scale, segIdx, n });

    // Accumulate curve for next segment
    // The curve contribution is weighted by scale so near segs shift more
    dx  += seg.curve;
    x   -= dx * scale * 0.4 * W;
  }

  // Draw back→front (largest n first = furthest away)
  // Each strip is drawn between seg[n] (far edge) and seg[n-1] (near edge)
  for (let n = segs.length - 1; n > 0; n--) {
    const far  = segs[n];
    const near = segs[n - 1];

    if (near.screenY >= H) continue;      // below screen
    if (far.screenY  >= near.screenY) continue; // degenerate

    // Skip if both off top of screen
    if (near.screenY < HORIZON) break;

    const alt = Math.floor(far.segIdx / 3) % 2; // alternating band
    const rumble = Math.floor(far.segIdx / 2) % 2;

    // Grass (full width behind road)
    cx.fillStyle = alt ? '#0f0c04' : '#131006';
    cx.fillRect(0, near.screenY, W, far.screenY - near.screenY);

    // Road surface
    cx.fillStyle = alt ? '#2a2826' : '#232120';
    cx.beginPath();
    cx.moveTo(far.screenX  - far.roadHalfW,  far.screenY);
    cx.lineTo(far.screenX  + far.roadHalfW,  far.screenY);
    cx.lineTo(near.screenX + near.roadHalfW, near.screenY);
    cx.lineTo(near.screenX - near.roadHalfW, near.screenY);
    cx.closePath();
    cx.fill();

    // Rumble strips
    const rumbleCol = rumble ? '#c8281e' : '#f0ede8';
    const rw = far.roadHalfW * 0.065;
    cx.fillStyle = rumbleCol;
    // left
    cx.beginPath();
    cx.moveTo(far.screenX  - far.roadHalfW,       far.screenY);
    cx.lineTo(far.screenX  - far.roadHalfW - rw,  far.screenY);
    cx.lineTo(near.screenX - near.roadHalfW - rw, near.screenY);
    cx.lineTo(near.screenX - near.roadHalfW,      near.screenY);
    cx.closePath(); cx.fill();
    // right
    cx.beginPath();
    cx.moveTo(far.screenX  + far.roadHalfW,       far.screenY);
    cx.lineTo(far.screenX  + far.roadHalfW + rw,  far.screenY);
    cx.lineTo(near.screenX + near.roadHalfW + rw, near.screenY);
    cx.lineTo(near.screenX + near.roadHalfW,      near.screenY);
    cx.closePath(); cx.fill();

    // Lane markings — center line and two lane dividers
    if (alt) {
      const lw = far.roadHalfW * 0.012;
      cx.fillStyle = 'rgba(180,180,120,0.5)';
      // center
      cx.beginPath();
      cx.moveTo(far.screenX  - lw, far.screenY);
      cx.lineTo(far.screenX  + lw, far.screenY);
      cx.lineTo(near.screenX + lw, near.screenY);
      cx.lineTo(near.screenX - lw, near.screenY);
      cx.closePath(); cx.fill();
      // left third
      cx.fillStyle = 'rgba(200,200,100,0.35)';
      const lx1f = far.screenX  - far.roadHalfW  * 0.33;
      const lx1n = near.screenX - near.roadHalfW * 0.33;
      cx.beginPath();
      cx.moveTo(lx1f - lw, far.screenY); cx.lineTo(lx1f + lw, far.screenY);
      cx.lineTo(lx1n + lw, near.screenY); cx.lineTo(lx1n - lw, near.screenY);
      cx.closePath(); cx.fill();
      // right third
      const lx2f = far.screenX  + far.roadHalfW  * 0.33;
      const lx2n = near.screenX + near.roadHalfW * 0.33;
      cx.beginPath();
      cx.moveTo(lx2f - lw, far.screenY); cx.lineTo(lx2f + lw, far.screenY);
      cx.lineTo(lx2n + lw, near.screenY); cx.lineTo(lx2n - lw, near.screenY);
      cx.closePath(); cx.fill();
    }
  }

  // ── CAR ──────────────────────────────────────────
  // Car sits at bottom center. Bottom of image = road surface.
  const CAR_W  = 120;
  const CAR_H  = 120;
  const carX   = W / 2;
  const carBot = H - 10;   // bottom of car = 10px from screen bottom

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.35)';
  cx.beginPath();
  cx.ellipse(carX, carBot - 4, CAR_W * 0.42, 8, 0, 0, Math.PI * 2);
  cx.fill();

  // Exhaust smoke — emitted from behind the car (bottom of image)
  tickSmoke();
  drawSmoke(); // drawn before car so car renders on top
  if (Math.random() < 0.5) {
    addSmoke(carX - CAR_W * 0.28, carBot + 2);
    addSmoke(carX + CAR_W * 0.28, carBot + 2);
  }

  // Car image
  if (carImg.complete && carImg.naturalWidth > 0) {
    cx.drawImage(carImg, carX - CAR_W / 2, carBot - CAR_H, CAR_W, CAR_H);
  } else {
    // Fallback rectangle
    cx.fillStyle = '#1a2a3a';
    cx.fillRect(carX - 32, carBot - 72, 64, 72);
    cx.fillStyle = '#f5c842';
    cx.fillRect(carX - 8, carBot - 72, 16, 50);
  }

  // Speed readout (minimal, bottom right)
  cx.fillStyle = 'rgba(255,255,255,0.4)';
  cx.font = '12px monospace';
  cx.textAlign = 'right';
  cx.fillText(Math.round(spd * 800) + ' mph', W - 12, H - 12);
  cx.textAlign = 'left';
}

requestAnimationFrame(frame);
</script>
</body>
</html>
